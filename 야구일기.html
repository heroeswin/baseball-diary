<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>야구 일기 ⚾</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=DM+Mono:wght@400;500&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #18181c;
    --surface2: #222228;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --accent: #e8c56a;
    --accent2: #c44b2b;
    --text: #f0ede6;
    --text2: #9b9690;
    --text3: #5c5a55;
    --win: #4caf78;
    --lose: #e05a4a;
    --draw: #8a8a8a;
    --win-bg: rgba(76,175,120,0.12);
    --lose-bg: rgba(224,90,74,0.12);
    --draw-bg: rgba(138,138,138,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px; right: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(232,197,106,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -200px; left: -150px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(196,75,43,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    max-width: 680px;
    margin: 0 auto;
    padding: 48px 24px 80px;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  .site-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 48px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .site-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  .site-title span { color: var(--accent); }
  .site-sub {
    font-size: 12px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.04em;
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 2px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 28px;
    width: fit-content;
  }
  .tab-btn {
    padding: 8px 20px;
    border: none;
    border-radius: 7px;
    background: transparent;
    color: var(--text2);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab-btn.active {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border2);
  }

  /* FORM */
  .form-section { display: flex; flex-direction: column; gap: 16px; }

  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
  }
  .form-card-title {
    font-size: 11px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .form-row { display: grid; gap: 12px; margin-bottom: 12px; }
  .form-row.cols2 { grid-template-columns: 1fr 1fr; }
  .form-row.cols3 { grid-template-columns: 1fr auto 1fr; align-items: end; }
  .form-row:last-child { margin-bottom: 0; }

  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label {
    font-size: 12px;
    color: var(--text2);
    letter-spacing: 0.02em;
  }
  .form-group input,
  .form-group select,
  .form-group textarea {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    border-color: var(--accent);
  }
  .form-group input::placeholder,
  .form-group textarea::placeholder {
    color: var(--text3);
  }
  .form-group select option { background: #1a1a1e; }
  .form-group textarea { resize: vertical; min-height: 90px; line-height: 1.7; }

  .score-vs {
    font-family: 'DM Mono', monospace;
    font-size: 18px;
    color: var(--text3);
    padding-bottom: 10px;
    text-align: center;
  }
  .score-input { text-align: center !important; font-size: 22px !important; font-family: 'DM Mono', monospace !important; font-weight: 500 !important; }

  /* STARS */
  .star-row { display: flex; gap: 6px; padding: 4px 0; }
  .star {
    font-size: 24px;
    cursor: pointer;
    color: var(--text3);
    transition: color 0.15s, transform 0.1s;
    line-height: 1;
  }
  .star:hover { transform: scale(1.2); }
  .star.active { color: var(--accent); }

  /* SAVE BUTTON */
  .btn-save {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #1a1200;
    border: none;
    border-radius: 10px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: 0.02em;
  }
  .btn-save:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-save:active { transform: scale(0.99); }

  /* DIARY LIST */
  .list-section { display: flex; flex-direction: column; gap: 12px; }

  .entry-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    transition: border-color 0.2s;
    animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .entry-card:hover { border-color: var(--border2); }

  .entry-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }
  .entry-teams {
    font-family: 'Noto Serif KR', serif;
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
  }
  .entry-date-str {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    margin-top: 3px;
  }
  .entry-delete {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 16px;
    padding: 2px 6px;
    border-radius: 6px;
    transition: all 0.15s;
    line-height: 1;
  }
  .entry-delete:hover { color: var(--lose); background: var(--lose-bg); }

  .entry-score-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }
  .entry-score {
    font-family: 'DM Mono', monospace;
    font-size: 28px;
    font-weight: 500;
    color: var(--text);
  }
  .result-badge {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.04em;
  }
  .badge-win { background: var(--win-bg); color: var(--win); border: 1px solid rgba(76,175,120,0.2); }
  .badge-lose { background: var(--lose-bg); color: var(--lose); border: 1px solid rgba(224,90,74,0.2); }
  .badge-draw { background: var(--draw-bg); color: var(--draw); border: 1px solid rgba(138,138,138,0.15); }

  .entry-tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .tag {
    font-size: 12px;
    color: var(--text2);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2px 10px;
  }
  .tag-mvp { color: var(--accent); border-color: rgba(232,197,106,0.2); background: rgba(232,197,106,0.06); }
  .entry-stars { color: var(--accent); font-size: 13px; letter-spacing: 1px; }
  .entry-memo {
    font-size: 14px;
    color: var(--text2);
    line-height: 1.75;
    border-top: 1px solid var(--border);
    padding-top: 10px;
    margin-top: 4px;
  }

  /* STATS BAR */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    text-align: center;
  }
  .stat-num {
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    margin-bottom: 2px;
  }
  .stat-label { font-size: 11px; color: var(--text3); letter-spacing: 0.04em; }
  .stat-win .stat-num { color: var(--win); }
  .stat-lose .stat-num { color: var(--lose); }
  .stat-total .stat-num { color: var(--accent); }

  /* EMPTY */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text3);
  }
  .empty-state .ball { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; line-height: 1.8; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent);
    color: #1a1200;
    padding: 10px 22px;
    border-radius: 30px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 480px) {
    .site-title { font-size: 24px; }
    .stats-bar { grid-template-columns: repeat(3, 1fr); }
    .form-row.cols2 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="wrapper">
  <header class="site-header">
    <div>
      <div class="site-title">야구 <span>일기</span> ⚾</div>
    </div>
    <div class="site-sub">BASEBALL DIARY</div>
  </header>

  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('write')">기록하기</button>
    <button class="tab-btn" onclick="showTab('list')">내 일기</button>
  </div>

  <!-- WRITE TAB -->
  <div id="tab-write">
    <div class="form-section">
      <div class="form-card">
        <div class="form-card-title">경기 정보</div>
        <div class="form-row cols2">
          <div class="form-group">
            <label>날짜</label>
            <input type="date" id="f-date">
          </div>
          <div class="form-group">
            <label>구장</label>
            <input type="text" id="f-stadium" placeholder="잠실, 고척, 수원...">
          </div>
        </div>
        <div class="form-row cols3">
          <div class="form-group">
            <label>우리팀</label>
            <input type="text" id="f-myteam" placeholder="LG 트윈스">
          </div>
          <div class="score-vs">vs</div>
          <div class="form-group">
            <label>상대팀</label>
            <input type="text" id="f-opponent" placeholder="KIA 타이거즈">
          </div>
        </div>
      </div>

      <div class="form-card">
        <div class="form-card-title">스코어</div>
        <div class="form-row cols3">
          <div class="form-group">
            <label>우리팀 점수</label>
            <input type="number" id="f-score-my" class="score-input" min="0" placeholder="5">
          </div>
          <div class="score-vs" style="padding-bottom:10px;">:</div>
          <div class="form-group">
            <label>상대팀 점수</label>
            <input type="number" id="f-score-op" class="score-input" min="0" placeholder="3">
          </div>
        </div>
      </div>

      <div class="form-card">
        <div class="form-card-title">오늘의 기록</div>
        <div class="form-row cols2" style="margin-bottom:14px;">
          <div class="form-group">
            <label>MVP (오늘의 선수)</label>
            <input type="text" id="f-mvp" placeholder="홍길동">
          </div>
          <div class="form-group">
            <label>날씨</label>
            <select id="f-weather">
              <option value="">선택</option>
              <option>☀️ 맑음</option>
              <option>⛅ 구름</option>
              <option>🌧️ 비</option>
              <option>🌙 야간</option>
            </select>
          </div>
        </div>
        <div class="form-group" style="margin-bottom:14px;">
          <label>별점</label>
          <div class="star-row" id="star-row">
            <span class="star" data-v="1" onclick="setStar(1)">★</span>
            <span class="star" data-v="2" onclick="setStar(2)">★</span>
            <span class="star" data-v="3" onclick="setStar(3)">★</span>
            <span class="star" data-v="4" onclick="setStar(4)">★</span>
            <span class="star" data-v="5" onclick="setStar(5)">★</span>
          </div>
        </div>
        <div class="form-group">
          <label>오늘의 기록</label>
          <textarea id="f-memo" placeholder="오늘 경기는... 분위기가 정말... 인상적인 장면은..."></textarea>
        </div>
      </div>

      <button class="btn-save" onclick="saveEntry()">⚾ 일기 저장하기</button>
    </div>
  </div>

  <!-- LIST TAB -->
  <div id="tab-list" style="display:none;">
    <div class="stats-bar" id="stats-bar"></div>
    <div class="list-section" id="diary-list"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let entries = JSON.parse(localStorage.getItem('baseball-diary-v2') || '[]');
let currentStar = 0;

function persist() {
  localStorage.setItem('baseball-diary-v2', JSON.stringify(entries));
}

function setStar(v) {
  currentStar = v;
  document.querySelectorAll('.star').forEach(s => {
    s.classList.toggle('active', parseInt(s.dataset.v) <= v);
  });
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

function getResult(my, op) {
  return my > op ? 'win' : my < op ? 'lose' : 'draw';
}

function saveEntry() {
  const date = document.getElementById('f-date').value;
  const myteam = document.getElementById('f-myteam').value.trim();
  const opponent = document.getElementById('f-opponent').value.trim();
  const scoreM = parseInt(document.getElementById('f-score-my').value);
  const scoreO = parseInt(document.getElementById('f-score-op').value);
  const stadium = document.getElementById('f-stadium').value.trim();
  const mvp = document.getElementById('f-mvp').value.trim();
  const weather = document.getElementById('f-weather').value;
  const memo = document.getElementById('f-memo').value.trim();

  if (!date || !myteam || !opponent || isNaN(scoreM) || isNaN(scoreO)) {
    toast('날짜, 팀 이름, 스코어를 입력해 주세요!');
    return;
  }

  entries.unshift({ id: Date.now(), date, myteam, opponent, scoreM, scoreO, stadium, mvp, weather, memo, star: currentStar });
  persist();
  resetForm();
  toast('일기가 저장됐어요 ⚾');
  showTab('list');
}

function resetForm() {
  ['f-date','f-myteam','f-opponent','f-score-my','f-score-op','f-stadium','f-mvp','f-memo'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-weather').value = '';
  currentStar = 0;
  document.querySelectorAll('.star').forEach(s => s.classList.remove('active'));
}

function deleteEntry(id) {
  entries = entries.filter(e => e.id !== id);
  persist();
  renderList();
}

function formatDate(str) {
  const d = new Date(str);
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
}

function renderStats() {
  const total = entries.length;
  const wins = entries.filter(e => getResult(e.scoreM, e.scoreO) === 'win').length;
  const loses = entries.filter(e => getResult(e.scoreM, e.scoreO) === 'lose').length;
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-card stat-total"><div class="stat-num">${total}</div><div class="stat-label">총 경기</div></div>
    <div class="stat-card stat-win"><div class="stat-num">${wins}</div><div class="stat-label">승</div></div>
    <div class="stat-card stat-lose"><div class="stat-num">${loses}</div><div class="stat-label">패</div></div>
  `;
}

function renderList() {
  renderStats();
  const el = document.getElementById('diary-list');
  if (entries.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="ball">⚾</div><p>아직 기록된 경기가 없어요.<br>첫 번째 야구 일기를 써보세요!</p></div>`;
    return;
  }
  el.innerHTML = entries.map(e => {
    const res = getResult(e.scoreM, e.scoreO);
    const resLabel = { win: '승리', lose: '패배', draw: '무승부' }[res];
    const badgeClass = `badge-${res}`;
    const stars = e.star > 0 ? '★'.repeat(e.star) + '☆'.repeat(5 - e.star) : '';
    return `
    <div class="entry-card">
      <div class="entry-top">
        <div>
          <div class="entry-teams">${e.myteam} <span style="color:var(--text3);font-weight:400">vs</span> ${e.opponent}</div>
          <div class="entry-date-str">${formatDate(e.date)}</div>
        </div>
        <button class="entry-delete" onclick="deleteEntry(${e.id})" title="삭제">✕</button>
      </div>
      <div class="entry-score-row">
        <div class="entry-score">${e.scoreM} : ${e.scoreO}</div>
        <span class="result-badge ${badgeClass}">${resLabel}</span>
      </div>
      <div class="entry-tags">
        ${e.stadium ? `<span class="tag">📍 ${e.stadium}</span>` : ''}
        ${e.weather ? `<span class="tag">${e.weather}</span>` : ''}
        ${e.mvp ? `<span class="tag tag-mvp">⭐ ${e.mvp}</span>` : ''}
        ${stars ? `<span class="entry-stars">${stars}</span>` : ''}
      </div>
      ${e.memo ? `<div class="entry-memo">${e.memo}</div>` : ''}
    </div>`;
  }).join('');
}

function showTab(t) {
  document.getElementById('tab-write').style.display = t === 'write' ? '' : 'none';
  document.getElementById('tab-list').style.display = t === 'list' ? '' : 'none';
  document.querySelectorAll('.tab-btn').forEach((el, i) => {
    el.classList.toggle('active', (i===0 && t==='write') || (i===1 && t==='list'));
  });
  if (t === 'list') renderList();
}

document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
</script>
</body>
</html>
